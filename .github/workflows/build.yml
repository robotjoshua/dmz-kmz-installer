name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: python build.py

      # --- Code signing (SignPath Foundation) ---
      # Uncomment once your SignPath project is approved.
      # See: https://about.signpath.io/product/open-source
      #
      # - name: Sign exe
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: dpm-kmz-installer
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: exe
      #     github-artifact-id: unsigned-exe
      #     wait-for-completion: true
      #     output-artifact-directory: dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DPMKMZInstaller
          path: dist/DPMKMZInstaller.exe

      # Attach to GitHub Release when a version tag is pushed
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DPMKMZInstaller.exe
